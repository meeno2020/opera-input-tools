name: Build

on:
  push:
    tags:
      - 'v*'          # trigger on version tags, e.g. v1.0.0
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract
        run: brew install tesseract

      - name: Install Python dependencies
        run: pip install -r v2/requirements.txt

      - name: Build macOS app
        working-directory: v2
        run: pyinstaller opera_input_tools.spec

      - name: Zip .app bundle
        working-directory: v2/dist
        run: zip -r "Data-Batch-Entry-System-macOS.zip" "Opera Input Tools.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Data-Batch-Entry-System-macOS
          path: v2/dist/Data-Batch-Entry-System-macOS.zip
          retention-days: 30

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract
        run: choco install tesseract --yes

      - name: Install Python dependencies
        run: pip install -r v2/requirements.txt

      - name: Build Windows exe
        working-directory: v2
        run: pyinstaller opera_input_tools.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Data-Batch-Entry-System-Windows
          path: "v2/dist/Data Batch Entry System.exe"
          retention-days: 30

  # ── Create GitHub Release (on tag push only) ───────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Data-Batch-Entry-System-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Data-Batch-Entry-System-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Data-Batch-Entry-System-macOS.zip
            Data Batch Entry System.exe
          generate_release_notes: true
